name: Sync from upstream (i-lynus/Jura-Repetitor)

on:
  schedule:
    - cron: '0 6 * * *'   # täglich 06:00 UTC
  workflow_dispatch:        # manuell auslösbar

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync
        run: |
          git remote add upstream https://github.com/i-lynus/Jura-Repetitor.git
          git fetch upstream main
          git merge upstream/main --no-edit -m "chore: sync from upstream"
          git push origin main
